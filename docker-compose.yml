services:
  pi-antigravity-rotator:
    build: .
    container_name: pi-antigravity-rotator
    ports:
      - "127.0.0.1:51200:51200"
    environment:
      PI_ROTATOR_DIR: /data
      PI_ROTATOR_TELEMETRY: "on"
      PI_ROTATOR_ADMIN_TOKEN: "${PI_ROTATOR_ADMIN_TOKEN:-}"
      ANTIGRAVITY_CLIENT_ID: "${ANTIGRAVITY_CLIENT_ID:-}"
      ANTIGRAVITY_CLIENT_SECRET: "${ANTIGRAVITY_CLIENT_SECRET:-}"
      ANTIGRAVITY_REDIRECT_URI: "${ANTIGRAVITY_REDIRECT_URI:-}"
      PI_ROTATOR_QUOTA_USER_AGENT: "${PI_ROTATOR_QUOTA_USER_AGENT:-}"
    volumes:
      - ./docker-data:/data
    restart: unless-stopped
